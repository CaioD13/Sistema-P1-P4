{% extends "base.html" %}

{% block content %}
<div class="card shadow border-0">
    <div class="card-header bg-primary text-white fw-bold">
        <i class="bi bi-pencil-square"></i> Editar Usuário
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">RE (Login)</label>
                    <input type="text" class="form-control" value="{{ usuario.username }}" disabled>
                    <small class="text-muted">Não pode ser alterado.</small>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Perfil</label>
                    <select name="role" class="form-select">
                        <option value="usuario" {% if usuario.role == 'usuario' %}selected{% endif %}>Usuário</option>
                        <option value="admin" {% if usuario.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a href="{{ url_for('usuarios_listar') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
