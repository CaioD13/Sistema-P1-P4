{% extends "base.html" %}

{% block content %}
<div class="card shadow border-0">
    <div class="card-header bg-secondary text-white fw-bold">
        🆕 Cadastro de Novo Material
    </div>
    <div class="card-body">
        <form method="POST">
            <!-- DADOS BÁSICOS -->
            <div class="row mb-3">
                <div class="col-md-3">
                    <label>Nº Patrimônio *</label>
                    <input type="text" name="patrimonio" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label>Nº Série</label>
                    <input type="text" name="n_serie" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Nome do Material *</label>
                    <input type="text" id="campoNome" name="nome_material" class="form-control" placeholder="Ex: Cadeira, Pistola..." required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Conta Patrimonial</label>
                    <select name="conta_codigo" class="form-select" required>
                        <option value="">Selecione...</option>
                        {% for codigo, nome in contas.items() %}
                            <option value="{{ codigo }}">{{ codigo }} - {{ nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Valor (R$)</label>
                    <input type="number" step="0.01" name="valor" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-3">
                    <label>Situação</label>
                    <select name="situacao" class="form-select">
                        <option value="Bom">Bom</option>
                        <option value="Regular">Regular</option>
                        <option value="Inservível">Inservível</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label>Localização (Padrão: Seção-Armário)</label>
                <input type="text" name="local" class="form-control" required>
            </div>

            <!-- CHECKBOX DE APREENSÃO -->
            <div class="form-check form-switch mb-3 p-3 bg-light rounded border">
                <input class="form-check-input" type="checkbox" id="checkApreensao" name="check_apreensao">
                <label class="form-check-label fw-bold text-danger" for="checkApreensao">
                    🚨 Material Proveniente de Apreensão / Custódia?
                </label>
            </div>

            <!-- CAMPOS DE APREENSÃO (OCULTOS INICIALMENTE) -->
            <div id="divApreensao" class="card border-danger mb-3 bg-light" style="display: none;">
                <div class="card-body">
                    <h6 class="text-danger fw-bold border-bottom pb-2">Detalhes da Custódia</h6>
                    <div class="row">
                        <div class="col-md-4">
                            <label>Local da Apreensão</label>
                            <input type="text" name="local_apreensao" class="form-control" placeholder="Ex: Rua X, Bairro Y">
                        </div>
                        <div class="col-md-4">
                            <label>Autoridade Responsável</label>
                            <input type="text" name="autoridade_resp" class="form-control" placeholder="Ex: Del. Polícia Civil">
                        </div>
                        <div class="col-md-2">
                            <label>Nº Doc (BOPC)</label>
                            <input type="text" name="num_doc_apreensao" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <label>Data Apreensão</label>
                            <input type="date" name="data_apreensao" class="form-control">
                            <small class="text-muted">Inicia o contador.</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DADOS DO PM (ARMA/COLETE) -->
            <div id="dadosPM" class="card bg-info bg-opacity-10 mb-3 p-3 border-info" style="display: none;">
                <h6 class="text-info fw-bold">👮 Material Controlado - Detentor</h6>
                <div class="row">
                    <div class="col-md-3">
                        <label>RE</label>
                        <input type="text" id="campoRE" name="pm_re" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>Nome</label>
                        <input type="text" name="pm_nome" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>OPM</label>
                        <input type="text" name="pm_opm" class="form-control">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label>Observações</label>
                <textarea name="observacoes" class="form-control" rows="2"></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-lg">💾 Salvar Cadastro</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Lógica 1: Armamento (Já existia)
    document.getElementById('campoNome').addEventListener('input', function(e) {
        const termo = e.target.value.toUpperCase();
        const div = document.getElementById('dadosPM');
        if (termo.includes('PISTOLA') || termo.includes('COLETE') || termo.includes('ALGEMA')) {
            div.style.display = 'block';
            document.getElementById('campoRE').required = true;
        } else {
            div.style.display = 'none';
            document.getElementById('campoRE').required = false;
        }
    });

    // Lógica 2: Apreensão (Nova)
    document.getElementById('checkApreensao').addEventListener('change', function(e) {
        const div = document.getElementById('divApreensao');
        div.style.display = e.target.checked ? 'block' : 'none';
        
        // Torna obrigatório se marcado
        const inputs = div.querySelectorAll('input');
        inputs.forEach(input => input.required = e.target.checked);
    });
</script>
{% endblock %}
